<!DOCTYPE html>
<html>
<head>
    <title>#{PackageName}# Sample Application</title>
    <base href="/" />
    <meta charset="utf-8" />
    <script>
        // For the standalone file preview route we want a lean, dark boot splash
        // instead of the full marketing loader. Detected before anything renders.
        (function () {
            var p = location.pathname.toLowerCase().replace(/\/+$/, '');
            if (p.endsWith('/preview-file')) {
                document.documentElement.classList.add('preview-boot');
            }
        })();
    </script>
    <style>
        /* Hidden unless we are on the preview-file route */
        #previewLoader { display: none; }

        html.preview-boot,
        html.preview-boot body { background: #121518; }

        /* Suppress the regular loaders on the preview route */
        html.preview-boot mud-ex-app-loader,
        html.preview-boot #modernLoader { display: none !important; }

        html.preview-boot #previewLoader {
            display: flex;
            position: fixed;
            inset: 0;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #121518;
            color: #e0e0e0;
            font-family: 'Roboto', 'Segoe UI', sans-serif;
        }

        #previewLoader .preview-loading-ring {
            position: relative;
            width: 6.5rem;
            height: 6.5rem;
        }

        #previewLoader .preview-loading-progress {
            display: block;
            width: 100%;
            height: 100%;
        }

        #previewLoader .preview-loading-progress circle {
            fill: none;
            stroke: rgba(255, 255, 255, 0.12);
            stroke-width: 0.4rem;
            transform-origin: 50% 50%;
            transform: rotate(-90deg);
        }

        #previewLoader .preview-loading-progress circle:last-child {
            stroke: #ff4081;
            /* Driven by Blazor's built-in boot progress variable */
            stroke-dasharray: calc(3.141 * var(--blazor-load-percentage, 0%) * 0.8), 500%;
            transition: stroke-dasharray 0.1s ease-in-out;
        }

        #previewLoader .preview-loading-percentage {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.15rem;
            font-weight: 600;
        }

        #previewLoader .preview-loading-percentage:after {
            content: var(--blazor-load-percentage-text, "0%");
        }

        #previewLoader .preview-loading-text {
            margin-top: 1.1rem;
            font-size: 0.9rem;
            letter-spacing: 0.04em;
            opacity: 0.8;
        }
    </style>
    <link rel="icon" type="image/png" href="logo.png">
    <meta name="description" content="#{PackageName}# is blazor component and extension library for mudblazor.">
    <meta name="keywords" content="blazor, asp.net core, wasm, web assembly, browser, components, extensions, online, single page application, dotnet, csharp, html, open-source, platform">
    <meta name="author" content="Florian Gilde">
    <meta property="og:title" content="#{PackageName}# is blazor component and extension library for mudblazor" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.mudex.org/" />
    <meta property="og:image" content="https://www.mudex.org/sample-data/logo.png" />
    <meta property="og:image:width" content="300" />
    <meta property="og:image:height" content="300" />
    <meta property="og:description" content="MudEx is blazor component and extension library for mudblazor." />
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://www.mudex.org/">
    <meta name="twitter:title" content="TryMudEx - Write, compile, execute and share Blazor components in the browser">
    <meta name="twitter:description" content="MudEx is blazor component and extension library for mudblazor.">
    <meta name="twitter:image" content="https://www.mudex.org/sample-data/logo.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <script src="/script.js?v=#{CACHE_TOKEN}#"></script>
    <script src="_content/MudBlazor.Extensions/js/components/MudExAppLoader.min.js"></script>
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="css/app.css?v=#{CACHE_TOKEN}#" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css?v=#{CACHE_TOKEN}#" rel="stylesheet" />
    <link href="MainSample.WebAssembly.styles.css?v=#{CACHE_TOKEN}#" rel="stylesheet">
    <link id="mudex-styles" href="_content/MudBlazor.Extensions/mudBlazorExtensions.min.css?v=#{CACHE_TOKEN}#" rel="stylesheet">
    <script type="text/javascript" src="https://js.live.net/v7.2/OneDrive.js"></script>
    <script src="/lib/monaco-editor/min/vs/loader.js?v=#{CACHE_TOKEN}#"></script>
    <script src="./_content/MudBlazor.Markdown/MudBlazor.Markdown.min.js?v=#{CACHE_TOKEN}#"></script>
    <link href="./_content/MudBlazor.Markdown/MudBlazor.Markdown.min.css?v=#{CACHE_TOKEN}#" rel="stylesheet" />

</head>
<body>

<mud-ex-app-loader AppName="" SubTitle="" AccentColor="#ff4081" MainAppId="app" Logo="/sample-data/logo.png">
</mud-ex-app-loader>

    <div id="app">
        <div id="previewLoader">
            <div class="preview-loading-ring">
                <svg class="preview-loading-progress">
                    <circle r="40%" cx="50%" cy="50%" />
                    <circle r="40%" cx="50%" cy="50%" />
                </svg>
                <span class="preview-loading-percentage"></span>
            </div>
            <div class="preview-loading-text">Loading preview…</div>
        </div>
        <div class="modern-loader-container" id="modernLoader">
            <div class="logo-container">
                <div class="logo-wrapper">
                    <div class="logo-glow"></div>
                    <img src="/sample-data/logo.png" alt="MudEx Logo" class="logo-img">
                </div>
            </div>

            <h1 class="app-title">#{PackageName}# v#{PackageVersion}#</h1>
            <p class="app-subtitle">for MudBlazor #{MudBlazorVersion}#</p>

            <div class="loading-spinner-container">
                <div class="spinner-ring"></div>
                <div class="spinner-ring"></div>
                <div class="spinner-ring"></div>
            </div>

            <div class="loading-text">
                Loading application
                <span class="loading-dots">
                    <span>.</span><span>.</span><span>.</span>
                </span>
            </div>

            <div class="progress-bar-container">
                <div class="progress-bar"></div>
            </div>

            <div class="feature-badges">
                <div class="feature-badge">#{ComponentCount}# Components</div>
                <div class="feature-badge">Powerful Extensions</div>
                <div class="feature-badge">Utilities and more</div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>


    <script src="_framework/blazor.webassembly.js?cb=#{CACHE_TOKEN}#"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js?cb=#{CACHE_TOKEN}#"></script>
</body>
</html>
